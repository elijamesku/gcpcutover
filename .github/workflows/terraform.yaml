# =============================================================================
# GitHub Actions — Terraform plan on PR, apply on push to main
# =============================================================================
# Secrets: GOOGLE_CREDENTIALS (GCP service account key JSON) or use Workload
# Identity Federation. TF_VAR_* can be set in repo env or secrets.
# =============================================================================

name: Terraform

on:
  push:
    branches: [main]
    paths: ['terraform/**', '.github/workflows/terraform.yaml']
  pull_request:
    branches: [main]
    paths: ['terraform/**', '.github/workflows/terraform.yaml']

env:
  TF_VERSION: '1.5.0'

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive -diff

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: |
          terraform plan -input=false -no-color -out=tfplan 2>&1 | tee plan.log
          echo "plan_output<<EOF" >> $GITHUB_OUTPUT
          cat plan.log >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          TF_VAR_project_id: ${{ secrets.TF_VAR_project_id }}
          TF_VAR_bucket_prefix: ${{ secrets.TF_VAR_bucket_prefix || secrets.TF_VAR_project_id }}

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const plan = `${{ steps.plan.outputs.plan_output }}`.replace(/`/g, '`').substring(0, 60000);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '#### Terraform Plan\n```\n' + plan + '\n```'
            });

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -input=false -auto-approve
        env:
          TF_VAR_project_id: ${{ secrets.TF_VAR_project_id }}
          TF_VAR_bucket_prefix: ${{ secrets.TF_VAR_bucket_prefix || secrets.TF_VAR_project_id }}
